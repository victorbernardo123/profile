<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>Contato - Victor Hugo</title>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #121214 !important;
            color: #e2e8f0;
        }
        
        /* Menu Premium */
        .custom-navbar {
            background-color: rgba(18, 18, 20, 0.85) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .custom-navbar .navbar-brand {
            color: #ffffff !important;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .custom-navbar .nav-link {
            color: #cbd5e1 !important;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .custom-navbar .nav-link:hover, .custom-navbar .nav-link.active {
            color: #ff6b00 !important;
        }
        
        .main-title {
            color: #ffffff;
            font-weight: 800;
            letter-spacing: -1.5px;
        }
        .text-orange {
            color: #ff6b00;
        }

        /* Card do Formulário Dark */
        .contact-card {
            max-width: 650px;
            margin: 0 auto;
            background-color: #1a1a1e;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            padding: 3rem !important;
        }

        /* Inputs Estilizados */
        .form-label {
            color: #ffffff;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }
        .form-control {
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 0.8rem 1.1rem;
            color: #ffffff;
            font-size: 0.95rem;
            background-color: #121214;
            transition: all 0.2s ease;
        }
        .form-control:focus {
            border-color: #ff6b00;
            box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.15);
            background-color: #121214;
            color: #ffffff;
        }
        .form-control::placeholder {
            color: #64748b;
        }

        /* Botão Laranja */
        .btn-submit {
            background: #ff6b00;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 0.95rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(255, 107, 0, 0.2);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            background: #e66000;
            box-shadow: 0 6px 20px rgba(255, 107, 0, 0.4);
            color: #ffffff;
        }

        /* Rodapé Fixo */
        .custom-footer {
            background-color: #0b0b0c !important;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .footer-link {
            color: #94a3b8 !important;
            display: inline-block;
            transition: transform 0.2s ease, color 0.2s ease;
        }
        .footer-link:hover {
            color: #ff6b00 !important;
            transform: translateY(-3px);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">
    
    <header>
        <nav class="navbar navbar-expand-lg custom-navbar sticky-top mb-5">
            <div class="container">
                <a class="navbar-brand" href="#">Victor Hugo</a>
                <button type="button" class="navbar-toggler border-secondary" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                    <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarMenu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a href="home.html" class="nav-link">Home</a></li>
                        <li class="nav-item"><a href="index.html" class="nav-link">Portfólio</a></li>
                        <li class="nav-item"><a href="contato.html" class="nav-link active fw-bold text-orange">Contato</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container flex-grow-1 py-4">
        <div class="row justify-content-center"> 
            
            <section class="col-12 text-center mb-5">
                <h1 class="main-title display-4 mb-2">Proposta de <span class="text-orange">Contratação</span></h1>
                <p class="text-white opacity-75 fs-5">Preencha os dados abaixo para me enviar um e-mail direto.</p>
            </section>
            
            <div class="col-12 mb-5">
                <section class="contact-card">
                    <form id="formContato">
                        
                        <div class="mb-4">
                            <label for="nome" class="form-label">
                                <i class="bi bi-building me-2 text-orange"></i> Nome do Recrutador / Empresa
                            </label>
                            <input type="text" class="form-control" id="nome" placeholder="Ex: Victor Hugo (Empresa X)" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="vaga" class="form-label">
                                <i class="bi bi-briefcase me-2 text-orange"></i> Vaga / Assunto
                            </label>
                            <input type="text" class="form-control" id="vaga" placeholder="Ex: Desenvolvedor Front-End Júnior" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="mensagem" class="form-label">
                                <i class="bi bi-chat-left-text me-2 text-orange"></i> Proposta / Mensagem
                            </label>
                            <textarea class="form-control" id="mensagem" rows="4" placeholder="Olá, gostamos do seu portfólio..." required></textarea>
                        </div>
                        
                        <div class="d-grid pt-2">
                            <button type="button" class="btn-submit w-100" onclick="enviarEmail()">
                                <i class="bi bi-envelope-paper-fill me-2"></i> Enviar Mensagem
                            </button>
                        </div>

                    </form>
                </section>
            </div>

        </div> 
    </main> 

    <footer class="custom-footer text-light text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-2 small text-muted">&copy; 2026 Victor Hugo. Todos os direitos reservados.</p>
            <div class="d-flex justify-content-center gap-4 fs-5 mt-2">
                <a href="#" target="_blank" class="footer-link"><i class="bi bi-linkedin"></i></a>
                <a href="#" target="_blank" class="footer-link"><i class="bi bi-whatsapp"></i></a>
                <a href="#" target="_blank" class="footer-link"><i class="bi bi-github"></i></a>
            </div>
        </div>
    </footer>

    <script>
        function enviarEmail() {
            const nome = document.getElementById('nome').value;
            const vaga = document.getElementById('vaga').value;
            const mensagem = document.getElementById('mensagem').value;

            if (!nome || !vaga || !mensagem) {
                alert("Por favor, preencha todos os campos antes de enviar.");
                return;
            }

            const emailDestino = "victorhugooliveira641@gmail.com";
            const assunto = encodeURIComponent(`Proposta de Vaga: ${vaga}`);
            const corpoEmail = encodeURIComponent(`Olá, meu nome é ${nome}.\n\nMensagem/Proposta:\n${mensagem}`);

            const urlGmail = `https://mail.google.com/mail/?view=cm&fs=1&to=${emailDestino}&su=${assunto}&body=${corpoEmail}`;

            window.open(urlGmail, '_blank');
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
