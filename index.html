<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>Portfólio - Meus Projetos</title>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #121214 !important;
            color: #e2e8f0;
        }
        
        /* Menu Premium */
        .custom-navbar {
            background-color: rgba(18, 18, 20, 0.85) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .custom-navbar .navbar-brand {
            color: #ffffff !important;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .custom-navbar .nav-link {
            color: #cbd5e1 !important;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .custom-navbar .nav-link:hover, .custom-navbar .nav-link.active {
            color: #ff6b00 !important;
        }
        
        .main-title {
            color: #ffffff;
            font-weight: 800;
            letter-spacing: -1.5px;
        }
        .text-orange {
            color: #ff6b00 !important;
        }

        /* Mockup estilo Navegador Dark */
        .browser-mockup {
            max-width: 950px;
            margin: 0 auto;
            background-color: #1a1a1e;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            transition: all 0.4s ease;
        }
        .browser-mockup:hover {
            transform: translateY(-4px);
        }
        
        .browser-header {
            background-color: #161619;
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .browser-dots { display: flex; gap: 8px; }
        .browser-dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background-color: #ef4444; }
        .dot-yellow { background-color: #f59e0b; }
        .dot-green { background-color: #10b981; }

        .carousel-img {
            height: 520px;
            object-fit: cover;
            background-color: #121214;
        }

        /* Setas Laranja do Carrossel */
        .control-icon-wrapper {
            background-color: rgba(26, 26, 30, 0.9);
            color: #ffffff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }
        .control-icon-wrapper:hover {
            transform: scale(1.1);
            color: #ff6b00;
            border-color: #ff6b00;
        }

        /* Rodapé Fixo */
        .custom-footer {
            background-color: #0b0b0c !important;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .footer-link {
            color: #94a3b8 !important;
            display: inline-block;
            transition: transform 0.2s ease, color 0.2s ease;
        }
        .footer-link:hover {
            color: #ff6b00 !important;
            transform: translateY(-3px);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">
    
    <header>
        <nav class="navbar navbar-expand-lg custom-navbar sticky-top mb-5">
            <div class="container">
                <a class="navbar-brand" href="index.html">Victor Hugo</a>
                <button type="button" class="navbar-toggler border-secondary" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                    <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarMenu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a href="home.html" class="nav-link">Home</a></li>
                        <li class="nav-item"><a href="index.html" class="nav-link active fw-bold text-orange">Portfólio</a></li>
                        <li class="nav-item"><a href="contato.html" class="nav-link">Contato</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container flex-grow-1 py-4">
        <div class="row justify-content-center"> 
            
            <section class="col-12 text-center mb-5">
                <h1 class="main-title display-4 mb-2">Meus <span class="text-orange">Projetos</span></h1>
                <p class="text-white opacity-75 fs-5">Uma vitrine interativa dos trabalhos que desenvolvi.</p>
            </section>
            
            <section class="col-12 mb-5">
                <div class="browser-mockup">
                    <div class="browser-header">
                        <div class="browser-dots">
                            <div class="browser-dot dot-red"></div>
                            <div class="browser-dot dot-yellow"></div>
                            <div class="browser-dot dot-green"></div>
                        </div>
                    </div>

                    <div id="carrosselProjetos" class="carousel slide carousel-fade" data-bs-ride="carousel">
                        <div class="carousel-inner">
                          <div class="carousel-item active" data-bs-interval="4500"><img src="imagens/imagem1.png" class="d-block w-100 carousel-img" alt="Projeto 1"></div>
                          <div class="carousel-item" data-bs-interval="4500"><img src="imagens/imagem2.png" class="d-block w-100 carousel-img" alt="Projeto 2"></div>
                          <div class="carousel-item" data-bs-interval="4500"><img src="imagens/imagem3.png" class="d-block w-100 carousel-img" alt="Projeto 3"></div>
                          <div class="carousel-item" data-bs-interval="4500"><img src="imagens/imagem4.png" class="d-block w-100 carousel-img" alt="Projeto 4"></div>
                          <div class="carousel-item" data-bs-interval="4500"><img src="imagens/imagem5.png" class="d-block w-100 carousel-img" alt="Projeto 5"></div>
                        </div>
                        
                        <button class="carousel-control-prev" type="button" data-bs-target="#carrosselProjetos" data-bs-slide="prev">
                          <div class="control-icon-wrapper"><i class="bi bi-arrow-left fs-5"></i></div>
                        </button>
                        <button class="carousel-control-next" type="button" data-bs-target="#carrosselProjetos" data-bs-slide="next">
                          <div class="control-icon-wrapper"><i class="bi bi-arrow-right fs-5"></i></div>
                        </button>
                    </div>
                </div>
            </section>

        </div> 
    </main> 

    <footer class="custom-footer text-light text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-2 small text-muted">&copy; 2026 Victor Hugo. Todos os direitos reservados.</p>
            <div class="d-flex justify-content-center gap-4 fs-5 mt-2">
                <a href="#" target="_blank" class="footer-link"><i class="bi bi-linkedin"></i></a>
                <a href="#" target="_blank" class="footer-link"><i class="bi bi-whatsapp"></i></a>
                <a href="#" target="_blank" class="footer-link"><i class="bi bi-github"></i></a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
